<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>clinic-portal -- SAM4C Model Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<style>
:root {
  --bg: #f7f8fa; --surface: #ffffff; --border: #e5e7eb; --border-strong: #d1d5db;
  --text: #1f2933; --muted: #6b7280; --accent: #4f46e5; --accent-soft: #eef2ff;
  --ok: #047857; --warn: #b45309; --danger: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; -webkit-font-smoothing: antialiased; }

#sidebar { width: 320px; min-width: 280px; background: var(--surface); color: var(--text); display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
#sidebar h1 { font-size: 14px; font-weight: 600; padding: 16px; color: var(--text); border-bottom: 1px solid var(--border); }
#sidebar h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); padding: 14px 16px 6px; }

#info-panel { padding: 12px 16px; border-bottom: 1px solid var(--border); min-height: 90px; }
#info-panel p { font-size: 12px; color: var(--muted); }
#info-name  { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
#info-type  { font-size: 12px; color: var(--text); margin-bottom: 6px; }
#info-attrs { font-size: 11.5px; color: var(--ok); line-height: 1.7; }
#info-ports { font-size: 11.5px; color: var(--warn); margin-top: 4px; }

#view-panel, #filter-panel { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.view-btn { display: inline-block; font-size: 11px; font-weight: 500; padding: 6px 12px; margin: 2px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; transition: all .12s; }
.view-btn:hover { border-color: var(--accent); }
.view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-btn { display: inline-block; font-size: 10px; font-weight: 600; padding: 4px 9px; margin: 2px; border-radius: 999px; border: none; cursor: pointer; color: white; opacity: 0.92; }
.filter-btn.off { opacity: 0.28; }

#coverage-panel { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
.ctx-item { font-size: 11.5px; margin: 5px 0; line-height: 1.5; }
.ctx-name  { color: var(--accent); font-weight: 600; margin-right: 6px; }
.ctx-comps { color: var(--muted); }

#warnings-panel { padding: 0 16px; }
.warn-item { font-size: 11.5px; color: var(--warn); margin: 4px 0; line-height: 1.45; }

#legend { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--muted); }
.legend-item { display: flex; align-items: center; margin: 4px 0; color: var(--text); }
.legend-line { width: 22px; height: 3px; margin-right: 8px; border-radius: 2px; flex-shrink: 0; }
.legend-dash { border-top: 2px dashed; height: 0; width: 22px; margin-right: 8px; flex-shrink: 0; }

#cy-container { flex: 1; position: relative; background: #fafbfc; }
#cy { width: 100%; height: 100%; }
#controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 5; }
.ctrl-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: all .12s; }
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

</style>
</head>
<body>
<div id="sidebar">
  <h1>&#9650; clinic-portal</h1>

  <h2>View</h2>
  <div id="view-panel">
    <button class="view-btn active" data-view="both">Both</button>
    <button class="view-btn" data-view="arch">Architecture</button>
    <button class="view-btn" data-view="security">Security</button>
  </div>

  <h2>Selected</h2>
  <div id="info-panel"><p>Click a node or edge to inspect it.</p></div>

  <h2>Filter rules</h2>
  <div id="filter-panel">
    <button class="filter-btn" style="background:#1565c0" data-rule="Confidentiality">Confidentiality</button>
    <button class="filter-btn" style="background:#2e7d32" data-rule="Integrity">Integrity</button>
    <button class="filter-btn" style="background:#c62828" data-rule="Isolation">Isolation</button>
    <button class="filter-btn" style="background:#6a1b9a" data-rule="Authentication">Authentication</button>
    <button class="filter-btn" style="background:#0891b2" data-rule="Authorization">Authorization</button>
  </div>

  <h2>Warnings</h2>
  <div id="warnings-panel"></div>

  <h2>Coverage</h2>
  <div id="coverage-panel"></div>

  <div id="legend">
    <div class="legend-item"><div class="legend-line" style="background:#1565c0"></div>Confidentiality</div>
    <div class="legend-item"><div class="legend-line" style="background:#2e7d32"></div>Integrity</div>
    <div class="legend-item"><div class="legend-dash" style="border-color:#c62828"></div>Isolation</div>
    <div class="legend-item"><div class="legend-line" style="background:#6a1b9a"></div>Authentication</div>
    <div class="legend-item"><div class="legend-line" style="background:#0891b2"></div>Authorization</div>
    <div class="legend-item"><div class="legend-line" style="background:#455a64"></div>Architecture link</div>
  </div>
</div>

<div id="cy-container">
  <div id="cy"></div>
  <div id="controls">
    <button class="ctrl-btn" onclick="fitGraph()">Fit</button>
    <button class="ctrl-btn" onclick="relayout()">Re-layout</button>
  </div>
</div>
<script>
let cy = null;
let currentView = 'both';
const activeFilters = new Set(['Confidentiality','Integrity','Isolation','Authentication','Authorization']);

function coseLayout() {
  return { name: 'cose', animate: true, animationDuration: 600, fit: true, padding: 30, nodeRepulsion: 5000, idealEdgeLength: 90, nestingFactor: 0.6 };
}
function fitGraph() { if (cy) cy.fit(null, 40); }
function relayout() { if (cy) cy.layout(coseLayout()).run(); }

function cyStyle() {
  return [
    { selector: 'node', style: { 'label':'data(label)', 'background-color':'data(bg)', 'shape':'data(shape)', 'color':'#ffffff', 'font-size':'10px', 'font-weight':500, 'text-valign':'center', 'text-halign':'center', 'text-wrap':'wrap', 'text-max-width':'90px', 'text-background-color':'#0f172a', 'text-background-opacity':0.6, 'text-background-padding':'3px', 'text-background-shape':'roundrectangle', 'border-width':1, 'border-color':'rgba(15,23,42,0.15)', 'padding':'6px', 'z-index':30 } },
    { selector: 'node[type = "Connector"]', style: { 'background-color':'data(bg)', 'font-size':'9px', 'shape':'diamond', 'width':'34px', 'height':'34px', 'border-width':1, 'border-color':'#94a3b8' } },
    // any container (VM, Host, Zone, Colocation, HostPool -- anything with children) gets
    // compound styling: label at top, roomy padding, faded fill, dark text (it's a light box)
    { selector: ':parent', style: { 'background-opacity':0.18, 'color':'#334155', 'font-size':'11px', 'font-weight':600, 'text-valign':'top', 'text-halign':'center', 'text-margin-y':1, 'text-background-opacity':0, 'border-color':'#cbd5e1', 'border-width':1, 'padding':'8px' } },
    { selector: 'edge', style: { 'line-color':'data(color)', 'target-arrow-color':'data(color)', 'target-arrow-shape':'triangle', 'arrow-scale':1.2, 'line-style':'data(style)', 'label':'data(label)', 'font-size':'9px', 'color':'#333', 'text-background-color':'#fff', 'text-background-opacity':0.9, 'text-background-padding':'2px', 'text-rotation':'autorotate', 'curve-style':'bezier', 'control-point-step-size':60, 'width':2, 'z-index':1 } },
    { selector: 'edge[layer = "arch"]', style: { 'line-color':'#94a3b8', 'target-arrow-color':'#94a3b8', 'source-arrow-color':'#94a3b8', 'target-arrow-shape':'triangle', 'source-arrow-shape':'none', 'width':1.5, 'line-opacity':0.55, 'color':'#475569', 'text-opacity':1 } },
    { selector: 'edge[layer = "arch"][dir = "inout"]', style: { 'source-arrow-shape':'triangle' } },
    { selector: '.highlighted', style: { 'border-color':'#f9a825', 'border-width':3, 'opacity':1 } },
    { selector: '.faded', style: { 'opacity':0.15 } }
  ];
}

function initGraph(elements, coverageData, warnings) {
  cy = cytoscape({ container: document.getElementById('cy'), elements: elements, style: cyStyle(), layout: coseLayout() });

  cy.on('tap', 'node', function(e) {
    const d = e.target.data();
    cy.elements().removeClass('highlighted faded');
    e.target.addClass('highlighted');
    e.target.neighborhood().addClass('highlighted');
    cy.elements().not(e.target.neighborhood()).not(e.target).addClass('faded');
    document.getElementById('info-panel').innerHTML =
      '<div id="info-name">' + d.label + '</div>' +
      '<div id="info-type">Type: ' + d.type + '</div>' +
      (d.attrs ? '<div id="info-attrs">Attributes: ' + d.attrs + '</div>' : '') +
      (d.ports ? '<div id="info-ports">Ports: ' + d.ports + '</div>' : '');
  });

  cy.on('tap', 'edge', function(e) {
    const d = e.target.data();
    cy.elements().removeClass('highlighted faded');
    e.target.addClass('highlighted');
    e.target.source().addClass('highlighted');
    e.target.target().addClass('highlighted');
    cy.elements().not(e.target).not(e.target.source()).not(e.target.target()).addClass('faded');
    if (d.layer === 'rule') {
      let html = '<div id="info-name">' + d.label + '</div>';
      html += '<div id="info-attrs">sctx = [' + (d.sctxAll || '') + ']</div>';
      if (d.tctxAll) html += '<div id="info-attrs">tctx = [' + d.tctxAll + ']</div>';
      if (d.actxAll) html += '<div id="info-attrs">actx = [' + d.actxAll + ']</div>';
      html += '<div id="info-ports" style="margin-top:6px">this edge: ' + e.target.source().data('label') + ' → ' + e.target.target().data('label') + '</div>';
      document.getElementById('info-panel').innerHTML = html;
    } else {
      document.getElementById('info-panel').innerHTML =
        '<div id="info-name">Architecture link</div>' +
        '<div id="info-type">' + e.target.source().data('label') + ' → ' + e.target.target().data('label') + '</div>';
    }
  });

  cy.on('tap', function(e) {
    if (e.target === cy) {
      cy.elements().removeClass('highlighted faded');
      document.getElementById('info-panel').innerHTML = '<p>Click a node or edge to inspect it.</p>';
    }
  });

  renderCoverage(coverageData);
  renderWarnings(warnings);
  applyView();
}

function renderCoverage(data) {
  const panel = document.getElementById('coverage-panel');
  if (!panel) return;
  if (!data) { panel.innerHTML = ''; return; }
  let html = '';
  for (const ctx in data) {
    const comps = data[ctx];
    const txt = comps.length ? comps.join(' ') : '(no match)';
    html += "<div class='ctx-item'><span class='ctx-name'>" + ctx + "</span><span class='ctx-comps'>" + txt + "</span></div>";
  }
  panel.innerHTML = html;
}

function renderWarnings(warnings) {
  const panel = document.getElementById('warnings-panel');
  if (!panel) return;
  if (!warnings || !warnings.length) { panel.innerHTML = "<div class='warn-item' style='color:#6c7086'>none</div>"; return; }
  panel.innerHTML = warnings.map(w => "<div class='warn-item'>! " + w + "</div>").join('');
}

function applyView() {
  if (!cy) return;
  if (currentView === 'both') {
    cy.elements().style('display', 'element');
    cy.edges('[layer = "rule"]').forEach(applyRuleFilter);
  } else if (currentView === 'arch') {
    cy.edges('[layer = "rule"]').style('display', 'none');
    cy.edges('[layer = "arch"]').style('display', 'element');
    cy.nodes().style('display', 'element');
  } else if (currentView === 'security') {
    cy.edges('[layer = "arch"]').style('display', 'none');
    cy.edges('[layer = "rule"]').forEach(applyRuleFilter);
    cy.nodes('[type = "Connector"]').style('display', 'none');
    cy.nodes('[type != "Connector"]').style('display', 'element');
  }
}

function applyRuleFilter(edge) {
  edge.style('display', activeFilters.has(edge.data('label')) ? 'element' : 'none');
}

document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', function() {
  currentView = this.dataset.view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  applyView();
}));

document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', function() {
  const rule = this.dataset.rule;
  if (activeFilters.has(rule)) { activeFilters.delete(rule); this.classList.add('off'); }
  else { activeFilters.add(rule); this.classList.remove('off'); }
  applyView();
}));

{ "data": { "id":"e3", "source":"n7", "target":"n1", "label":"Isolation", "color":"#c62828", "style":"dashed", "layer":"rule", "sctxAll":"DatabaseVM, PatientDB", "tctxAll":"FrontendVM, Nginx", "actxAll":"" } },
{ "data": { "id":"e4", "source":"n9", "target":"n1", "label":"Isolation", "color":"#c62828", "style":"dashed", "layer":"rule", "sctxAll":"AdminVM, AdminDashboard", "tctxAll":"FrontendVM, Nginx", "actxAll":"" } },
