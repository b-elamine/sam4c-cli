name: clinic-portal

components:
  - name: FrontendVM
    type: VM
    attributes:
      Domain: frontend
    children:
      - name: Nginx
        type: App
        attributes:
          Domain: frontend
        runtime: container
        exposure: external
        ports:
          - { name: http_in, number: 80, protocol: http }
          - { name: api_out, number: 8080, protocol: http }

  - name: BackendVM
    type: VM
    attributes:
      Domain: backend
    children:
      # SpringAPI + a logging sidecar are co-located (share the pod's network)
      - name: api-pod
        type: Colocation
        shareNetwork: true
        shareStorage: false
        scale:                 # the pod scales as a unit (R-F5)
          replicas: 3
          min: 2
          max: 10
          metric: cpu
        children:
          - name: SpringAPI
            type: App
            attributes:
              Domain: backend
            runtime: container
            exposure: internal
            image: registry/clinic-api:1.4.2
            resources:
              cpu: "500m"
              memory: "512Mi"
            ports: [api_in, db_out, admin_in]
          - name: LogSidecar
            type: App
            attributes:
              Role: logging          # co-located in the pod, but NOT part of the backend trust zone
            runtime: container
            ports: [log_in]

  - name: DatabaseVM
    type: VM
    attributes:
      Domain: database
    children:
      - name: PatientDB
        type: Data
        attributes:
          Domain: database
          DataClass: clinical
        runtime: container
        image: postgres:16
        persistent: true
        storage:
          size: 20Gi
          class: ssd
        config:
          POSTGRES_DB: clinic
        secrets: [DB_PASSWORD]
        ports: [db_in]

  - name: AdminVM
    type: VM
    attributes:
      Domain: admin
    children:
      - name: AdminDashboard
        type: App
        attributes:
          Domain: admin
          Role: administrator
        ports: [mgmt_out]

connectors:
  - name: FE_to_BE
    protocol: http
  - name: BE_to_DB
    protocol: tcp
  - name: Admin_to_BE
    protocol: http
  - name: Internet
    external: true
    protocol: http

links:
  # Internet -> Nginx (Nginx receives inbound web traffic)
  - port: Nginx.http_in
    connector: Internet
    direction: in
  # Nginx -> FE_to_BE (Nginx sends API calls toward the backend)
  - port: Nginx.api_out
    connector: FE_to_BE
    direction: out
  # FE_to_BE -> SpringAPI (backend receives the frontend's calls)
  - port: SpringAPI.api_in
    connector: FE_to_BE
    direction: in
  # SpringAPI -> BE_to_DB (backend sends queries toward the database)
  - port: SpringAPI.db_out
    connector: BE_to_DB
    direction: out
  # BE_to_DB -> PatientDB (database receives the queries)
  - port: PatientDB.db_in
    connector: BE_to_DB
    direction: in
  # AdminDashboard -> Admin_to_BE (admin sends management calls)
  - port: AdminDashboard.mgmt_out
    connector: Admin_to_BE
    direction: out
  # Admin_to_BE -> SpringAPI (backend receives admin management calls)
  - port: SpringAPI.admin_in
    connector: Admin_to_BE
    direction: in
